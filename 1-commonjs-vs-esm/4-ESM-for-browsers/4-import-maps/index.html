<!--
For larger projects, repeating the same CDN URLs everywhere isn't great.
So you can use import maps to declare aliases for them.

Adding a trailing slash (/) allows you to import subpaths.
-->
<script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/": "https://esm.sh/react-dom@18.3.1/"
    }
  }
</script>
<script type="module" src="./main.js"></script>
<div id="root"></div>
