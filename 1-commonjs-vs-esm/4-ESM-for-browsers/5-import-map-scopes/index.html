<!--
You can even even use different aliases for different parts of your app,
using import map scopes.

Here, main.js gets react 18, and legacy/main.js gets react 17.
-->
<script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1"
    },
    "scopes": {
      "/legacy/": {
        "react": "https://esm.sh/react@17"
      }
    }
  }
</script>
<script type="module" src="./main.js"></script>
<script type="module" src="./legacy/main.js"></script>
<div id="root"></div>
